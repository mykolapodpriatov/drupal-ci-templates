---
# Meta-CI: lint THIS repository's own YAML / workflows / shell so we don't
# ship broken templates.
#
# The actual linter invocations (tools, flags, paths) live in
# scripts/lint-all.sh. This workflow only installs the tools and then runs
# that script, so CI and a local `./scripts/lint-all.sh` can't drift apart.

name: Meta CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint (yamllint + actionlint + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pipx install yamllint

      - name: Install actionlint (pinned)
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.1
          sudo mv ./actionlint /usr/local/bin/actionlint
          actionlint -version

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run all linters
        run: ./scripts/lint-all.sh
