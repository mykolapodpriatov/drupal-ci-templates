---
# Meta-CI: lint THIS repository's own YAML / workflows / shell so we don't
# ship broken templates.

name: Meta CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          file_or_dir: >-
            .github/workflows
            github-actions
            gitlab-ci
            bitbucket-pipelines

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.1
          ./actionlint -version
      - name: Lint workflows under .github/workflows
        run: ./actionlint -color .github/workflows/*.yml
      - name: Lint distributed templates under github-actions/
        run: ./actionlint -color -shellcheck= github-actions/*.yml

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shellcheck
      - name: Lint shell scripts
        run: shellcheck scripts/*.sh
