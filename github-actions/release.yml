---
# Cuts a GitHub Release whenever a semver tag is pushed.
#
# - Auto-generates release notes from PRs since the previous tag.
# - Attaches a Composer-built artefact (vendor/ + web/) as a tarball.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: gd, mbstring, intl, pdo_mysql, opcache
          coverage: none
          tools: composer:v2

      - name: Build production artefact
        run: |
          composer install --no-dev --optimize-autoloader --prefer-dist
          tar --exclude='./.git' --exclude='./tests' --exclude='./node_modules' \
            -czf "drupal-release-${GITHUB_REF_NAME}.tar.gz" .

      - name: Extract changelog entry
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the section between "## [<version>]" and the next "## [" header.
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && $0 ~ "^## \\[" {exit}
            flag {print}
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No changelog entry for $version — falling back to auto-notes." >&2
            echo "Release $GITHUB_REF_NAME" > /tmp/release-notes.md
          fi
          {
            echo "notes<<EOF"
            cat /tmp/release-notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            drupal-release-${{ github.ref_name }}.tar.gz
