---
# Full Drupal CI pipeline.
#
# Copy this file to .github/workflows/ci.yml in your project, then:
#   - Adjust DRUPAL_WEB_ROOT if your docroot is not "web/".
#   - Adjust the test paths in phpunit.xml.dist.
#   - Pick one of the deploy patterns at the bottom and delete the rest.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  DRUPAL_WEB_ROOT: web
  COMPOSER_NO_INTERACTION: "1"
  COMPOSER_MEMORY_LIMIT: -1
  SIMPLETEST_BASE_URL: http://127.0.0.1:8080

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: lint — fast, runs once per PHP version (Drupal version irrelevant)
  # ---------------------------------------------------------------------------
  lint:
    name: "Lint (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, mbstring, intl, pdo_mysql, opcache
          coverage: none
          tools: composer:v2, cs2pr

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: PHPCS (Drupal + DrupalPractice)
        run: ./scripts/run-phpcs.sh

      - name: Twig CS
        run: vendor/bin/twigcs ${{ env.DRUPAL_WEB_ROOT }}/modules/custom ${{ env.DRUPAL_WEB_ROOT }}/themes/custom || true

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml

  # ---------------------------------------------------------------------------
  # Stage 2: static analysis — PHPStan + deprecation rules
  # ---------------------------------------------------------------------------
  static:
    name: "PHPStan (PHP ${{ matrix.php }}, Drupal ${{ matrix.drupal }})"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3"]
        drupal: ["^10.3", "^11"]
        # Drupal 11 requires PHP 8.3+, so PHP 8.2 × ^11 can never resolve.
        exclude:
          - php: "8.2"
            drupal: "^11"
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, mbstring, intl, pdo_mysql, opcache
          coverage: none
          tools: composer:v2

      - name: Pin Drupal core to ${{ matrix.drupal }}
        run: |
          composer require --no-update \
            "drupal/core-recommended:${{ matrix.drupal }}" \
            "drupal/core-composer-scaffold:${{ matrix.drupal }}" \
            "drupal/core-project-message:${{ matrix.drupal }}"
          composer require --no-update --dev \
            "drupal/core-dev:${{ matrix.drupal }}"

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: "--prefer-dist"

      - name: PHPStan (level 8 + phpstan-drupal)
        run: ./scripts/run-phpstan.sh

      - name: PHPMD
        run: vendor/bin/phpmd ${{ env.DRUPAL_WEB_ROOT }}/modules/custom text cleancode,codesize,unusedcode || true

  # ---------------------------------------------------------------------------
  # Stage 3: unit tests
  # ---------------------------------------------------------------------------
  unit:
    name: "Unit (PHP ${{ matrix.php }}, Drupal ${{ matrix.drupal }})"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3"]
        drupal: ["^10.3", "^11"]
        # Drupal 11 requires PHP 8.3+, so PHP 8.2 × ^11 can never resolve.
        exclude:
          - php: "8.2"
            drupal: "^11"
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, mbstring, intl, pdo_mysql, opcache
          coverage: pcov
          tools: composer:v2

      - name: Pin Drupal core to ${{ matrix.drupal }}
        run: |
          composer require --no-update \
            "drupal/core-recommended:${{ matrix.drupal }}" \
            "drupal/core-composer-scaffold:${{ matrix.drupal }}" \
            "drupal/core-project-message:${{ matrix.drupal }}"
          composer require --no-update --dev \
            "drupal/core-dev:${{ matrix.drupal }}"

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Run unit suite
        run: vendor/bin/phpunit --testsuite=unit --colors=always

  # ---------------------------------------------------------------------------
  # Stage 4: kernel tests — need MySQL but no web server
  # ---------------------------------------------------------------------------
  kernel:
    name: "Kernel (PHP ${{ matrix.php }}, Drupal ${{ matrix.drupal }})"
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3"]
        drupal: ["^10.3", "^11"]
        # Drupal 11 requires PHP 8.3+, so PHP 8.2 × ^11 can never resolve.
        exclude:
          - php: "8.2"
            drupal: "^11"
    services:
      mysql:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: drupal
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mariadb-admin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      SIMPLETEST_DB: "mysql://root:root@127.0.0.1:3306/drupal"
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, mbstring, intl, pdo_mysql, opcache
          coverage: none
          tools: composer:v2

      - name: Pin Drupal core to ${{ matrix.drupal }}
        run: |
          composer require --no-update \
            "drupal/core-recommended:${{ matrix.drupal }}" \
            "drupal/core-composer-scaffold:${{ matrix.drupal }}" \
            "drupal/core-project-message:${{ matrix.drupal }}"
          composer require --no-update --dev \
            "drupal/core-dev:${{ matrix.drupal }}"

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Wait for MySQL
        run: ./scripts/wait-for-mysql.sh 127.0.0.1 3306

      - name: Run kernel suite
        run: vendor/bin/phpunit --testsuite=kernel --colors=always

  # ---------------------------------------------------------------------------
  # Stage 5: functional tests — full Drupal install + chromedriver
  # ---------------------------------------------------------------------------
  functional:
    name: "Functional (PHP ${{ matrix.php }}, Drupal ${{ matrix.drupal }})"
    runs-on: ubuntu-latest
    needs: kernel
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3"]
        drupal: ["^10.3", "^11"]
        # Drupal 11 requires PHP 8.3+, so PHP 8.2 × ^11 can never resolve.
        exclude:
          - php: "8.2"
            drupal: "^11"
    services:
      mysql:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: drupal
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mariadb-admin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      chrome:
        image: selenium/standalone-chrome:124.0
        ports:
          - 4444:4444
        options: --shm-size=2g
    env:
      SIMPLETEST_DB: "mysql://root:root@127.0.0.1:3306/drupal"
      MINK_DRIVER_ARGS_WEBDRIVER: '["chrome", {"browserName":"chrome","goog:chromeOptions":{"args":["--disable-gpu","--headless","--no-sandbox"]}}, "http://127.0.0.1:4444/wd/hub"]'
      BROWSERTEST_OUTPUT_DIRECTORY: /tmp/browser-output
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, mbstring, intl, pdo_mysql, opcache
          coverage: none
          tools: composer:v2

      - name: Pin Drupal core to ${{ matrix.drupal }}
        run: |
          composer require --no-update \
            "drupal/core-recommended:${{ matrix.drupal }}" \
            "drupal/core-composer-scaffold:${{ matrix.drupal }}" \
            "drupal/core-project-message:${{ matrix.drupal }}"
          composer require --no-update --dev \
            "drupal/core-dev:${{ matrix.drupal }}"

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Wait for MySQL
        run: ./scripts/wait-for-mysql.sh 127.0.0.1 3306

      - name: Bootstrap Drupal
        run: ./scripts/setup-drupal.sh

      - name: Start built-in web server
        run: |
          mkdir -p /tmp/browser-output
          php -S 127.0.0.1:8080 -t ${{ env.DRUPAL_WEB_ROOT }} > /tmp/php-server.log 2>&1 &
          sleep 2
          curl -sf http://127.0.0.1:8080 > /dev/null

      - name: Run functional suite
        run: vendor/bin/phpunit --testsuite=functional --colors=always

      - name: Upload functional artefacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: functional-output-php${{ matrix.php }}-drupal${{ matrix.drupal }}
          path: |
            /tmp/browser-output
            /tmp/php-server.log
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Stage 6: security — composer audit + optional upgrade_status
  # ---------------------------------------------------------------------------
  security:
    name: Security audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: gd, mbstring, intl, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: composer audit
        run: composer audit --locked --no-dev

  # ---------------------------------------------------------------------------
  # Stage 7: deploy — main branch only. Pick ONE pattern below, delete others.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (staging)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [static, functional, security]
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: gd, mbstring, intl, pdo_mysql, opcache
          coverage: none
          tools: composer:v2

      - name: Build production artefact
        run: |
          composer install --no-dev --optimize-autoloader --prefer-dist

      # --- Pattern A: rsync over SSH ----------------------------------------
