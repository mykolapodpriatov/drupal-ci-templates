---
# CI for a Drupal monorepo with multiple custom modules.
#
# Uses dorny/paths-filter to skip jobs for unaffected modules. Each module
# under web/modules/custom/<name>/ becomes its own filter; add new entries
# as you add modules.

name: CI (monorepo)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

env:
  COMPOSER_NO_INTERACTION: "1"
  COMPOSER_MEMORY_LIMIT: -1

jobs:
  changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      module_foo: ${{ steps.filter.outputs.module_foo }}
      module_bar: ${{ steps.filter.outputs.module_bar }}
      module_baz: ${{ steps.filter.outputs.module_baz }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'composer.json'
              - 'composer.lock'
              - 'phpstan.neon.dist'
              - 'phpcs.xml.dist'
              - 'phpunit.xml.dist'
              - 'scripts/**'
              - '.github/workflows/**'
            module_foo:
              - 'web/modules/custom/foo/**'
            module_bar:
              - 'web/modules/custom/bar/**'
            module_baz:
              - 'web/modules/custom/baz/**'

  # ---------------------------------------------------------------------------
  # Shared lint pass — always runs if anything changed
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.module_foo == 'true' ||
      needs.changes.outputs.module_bar == 'true' ||
      needs.changes.outputs.module_baz == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: gd, mbstring, intl, pdo_mysql, opcache
          coverage: none
          tools: composer:v2, cs2pr

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: PHPCS
        run: ./scripts/run-phpcs.sh

  # ---------------------------------------------------------------------------
  # Per-module test jobs — only run if that module (or shared deps) changed
  # ---------------------------------------------------------------------------
  test-foo:
    name: "Test module: foo"
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.module_foo == 'true' || needs.changes.outputs.shared == 'true'
    services:
      mysql:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: drupal
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mariadb-admin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      SIMPLETEST_DB: "mysql://root:root@127.0.0.1:3306/drupal"
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: gd, mbstring, intl, pdo_mysql, opcache
          coverage: none
          tools: composer:v2
      - uses: ramsey/composer-install@v3
      # Require drupal/core-dev so PHPStan (phpstan-drupal) and PHPUnit's test
      # base classes are present, matching the project's pinned core version.
      # Without this the per-module jobs error on a fresh project.
      - name: Require Drupal core-dev
        run: composer require --dev "drupal/core-dev:*" --no-progress
      - run: ./scripts/wait-for-mysql.sh 127.0.0.1 3306
      - run: ./scripts/run-phpstan.sh web/modules/custom/foo
      - run: vendor/bin/phpunit --group=foo --colors=always

  test-bar:
    name: "Test module: bar"
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.module_bar == 'true' || needs.changes.outputs.shared == 'true'
    services:
      mysql:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: drupal
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mariadb-admin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      SIMPLETEST_DB: "mysql://root:root@127.0.0.1:3306/drupal"
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: gd, mbstring, intl, pdo_mysql, opcache
          coverage: none
          tools: composer:v2
      - uses: ramsey/composer-install@v3
      # Require drupal/core-dev so PHPStan (phpstan-drupal) and PHPUnit's test
      # base classes are present, matching the project's pinned core version.
      # Without this the per-module jobs error on a fresh project.
      - name: Require Drupal core-dev
        run: composer require --dev "drupal/core-dev:*" --no-progress
      - run: ./scripts/wait-for-mysql.sh 127.0.0.1 3306
      - run: ./scripts/run-phpstan.sh web/modules/custom/bar
      - run: vendor/bin/phpunit --group=bar --colors=always

  test-baz:
    name: "Test module: baz"
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: needs.changes.outputs.module_baz == 'true' || needs.changes.outputs.shared == 'true'
    services:
      mysql:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: drupal
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mariadb-admin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      SIMPLETEST_DB: "mysql://root:root@127.0.0.1:3306/drupal"
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: gd, mbstring, intl, pdo_mysql, opcache
          coverage: none
          tools: composer:v2
      - uses: ramsey/composer-install@v3
      # Require drupal/core-dev so PHPStan (phpstan-drupal) and PHPUnit's test
      # base classes are present, matching the project's pinned core version.
      # Without this the per-module jobs error on a fresh project.
      - name: Require Drupal core-dev
        run: composer require --dev "drupal/core-dev:*" --no-progress
      - run: ./scripts/wait-for-mysql.sh 127.0.0.1 3306
      - run: ./scripts/run-phpstan.sh web/modules/custom/baz
      - run: vendor/bin/phpunit --group=baz --colors=always
