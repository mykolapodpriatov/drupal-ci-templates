---
# Minimal Drupal CI — lint + phpstan + unit only.
#
# For small contrib-style modules where kernel/functional tests live in
# drupal.org's GitLab pipeline and the GitHub mirror only needs a fast
# sanity check.

name: CI (minimal)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  COMPOSER_NO_INTERACTION: "1"
  COMPOSER_MEMORY_LIMIT: -1

jobs:
  check:
    name: "Check (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, mbstring, intl, pdo_mysql, opcache
          coverage: none
          tools: composer:v2, cs2pr

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: PHPCS
        run: ./scripts/run-phpcs.sh

      - name: PHPStan
        run: ./scripts/run-phpstan.sh

      - name: Unit tests
        run: vendor/bin/phpunit --testsuite=unit --colors=always
