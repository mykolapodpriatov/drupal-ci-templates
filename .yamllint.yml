---
# yamllint configuration used by both the meta workflow and any contributor
# running yamllint locally. The rules favour readability over strictness —
# CI templates often need long single-line strings (e.g. MINK_DRIVER_ARGS).

extends: default

rules:
  line-length:
    max: 200
    level: warning
  comments:
    min-spaces-from-content: 1
  truthy:
    allowed-values: ["true", "false", "on", "off"]
    check-keys: false
  document-start:
    present: true
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1

ignore: |
  vendor/
  node_modules/
  .ddev/
  examples/recipes/**/composer.json
